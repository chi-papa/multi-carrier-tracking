<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>荷物追跡</title>
  <style>
    body { font-family: sans-serif; background: #fff; color: #111; margin: 0; padding: 0; }
    *, *::before, *::after { box-sizing: border-box; }
    input, select, button { font-family: inherit; font-size: 14px; padding: 8px 12px; border-radius: 8px; border: 0.5px solid #ccc; outline: none; }
    input:focus, select:focus { border-color: #888; }
    .wrap { max-width: 520px; margin: 2rem auto; padding: 0 1rem; }
    h2 { font-size: 20px; font-weight: 500; margin: 0 0 0.25rem; }
    .sub { font-size: 14px; color: #666; margin: 0 0 1.25rem; }
    label { font-size: 13px; color: #666; display: block; margin-bottom: 5px; }
    select { width: 100%; margin-bottom: 1rem; background: #fff; }
    .badge { display: flex; align-items: center; gap: 10px; background: #f5f5f5; border-radius: 8px; padding: 9px 14px; margin-bottom: 1rem; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .badge-name { font-size: 14px; font-weight: 500; }
    .badge-hint { font-size: 12px; color: #999; margin-left: auto; }
    .input-row { display: flex; gap: 8px; margin-bottom: 0.75rem; }
    .input-row input { flex: 1; }
    .btn { color: #fff; border: none; border-radius: 8px; padding: 0 18px; height: 38px; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
    .btn:hover { opacity: 0.82; }
    .result { display: none; margin-top: 1rem; background: #f5f5f5; border-radius: 12px; padding: 1rem 1.25rem; }
    .result.show { display: block; }
    .rlabel { font-size: 12px; color: #666; margin-bottom: 4px; }
    .rno { font-size: 15px; font-weight: 500; margin-bottom: 10px; }
    .rlink { display: block; color: #fff; text-align: center; padding: 9px; border-radius: 8px; font-size: 14px; font-weight: 500; text-decoration: none; }
    .rlink:hover { opacity: 0.82; }
    .rnote { font-size: 12px; color: #999; margin-top: 7px; }
  </style>
</head>
<body>
<div class="wrap">
  <h2>荷物追跡</h2>
  <div class="sub">運送会社を選んで追跡番号を入力</div>

  <label>運送会社</label>
  <select id="carrier" onchange="onChange()">
    <option value="sagawa">佐川急便</option>
    <option value="yamato">ヤマト運輸</option>
    <option value="yupack">日本郵便</option>
    <option value="seino">西濃運輸</option>
    <option value="fukutsu">福山通運</option>
    <option value="jplogistics">JPロジスティクス</option>
    <option value="kinbutsurex">近物レックス</option>
    <option value="tonami">トナミ運輸</option>
    <option value="daiichi">第一貨物</option>
    <option value="meitetsuunyu">名鉄運輸</option>
    <option value="sline">エスライン</option>
    <option value="seino_sx">セイノースーパーエクスプレス</option>
    <option value="okaken">岡山県貨物運送</option>
    <option value="kurumeunsou">久留米運送</option>
  </select>

  <div class="badge">
    <div class="dot" id="dot"></div>
    <div class="badge-name" id="bname"></div>
    <div class="badge-hint" id="bhint"></div>
  </div>

  <label>追跡番号</label>
  <div class="input-row">
    <input type="text" id="no" placeholder="追跡番号を入力" maxlength="40" />
    <button class="btn" id="btn" onclick="doTrack()">追跡する</button>
  </div>

  <div class="result" id="result">
    <div class="rlabel" id="rlabel"></div>
    <div class="rno" id="rno"></div>
    <a class="rlink" id="rlink" href="#" target="_blank">追跡結果を見る →</a>
    <div class="rnote">※ 新しいタブで追跡ページが開きます</div>
  </div>
</div>

<script>
const C = {
  sagawa:       { name:'佐川急便',                      color:'#1565C0', hint:'12桁',     id:'sagawa' },
  yamato:       { name:'ヤマト運輸',                    color:'#212121', hint:'12桁',     id:'yamato' },
  yupack:       { name:'日本郵便',                      color:'#C62828', hint:'12〜13桁', id:'yupack' },
  seino:        { name:'西濃運輸',                      color:'#B71C1C', hint:'11桁',     id:'seino' },
  fukutsu:      { name:'福山通運',                      color:'#1B5E20', hint:'10桁',     id:'fukutsu' },
  jplogistics:  { name:'JPロジスティクス',              color:'#4A148C', hint:'11桁',     id:'jplogistics' },
  kinbutsurex:  { name:'近物レックス',                  color:'#E65100', hint:'11桁',     id:'kinbutsurex' },
  tonami:       { name:'トナミ運輸',                    color:'#006064', hint:'10桁',     id:'tonami' },
  daiichi:      { name:'第一貨物',                      color:'#37474F', hint:'10桁',     id:'daiichi' },
  meitetsuunyu: { name:'名鉄運輸',                      color:'#880E4F', hint:'11桁',     id:'meitetsuunyu' },
  sline:        { name:'エスライン',                    color:'#558B2F', hint:'10桁',     id:'sline' },
  seino_sx:     { name:'セイノースーパーエクスプレス',  color:'#BF360C', hint:'11桁',     id:'seino_sx' },
  okaken:       { name:'岡山県貨物運送',                color:'#4527A0', hint:'10桁',     id:'okaken' },
  kurumeunsou:  { name:'久留米運送',                    color:'#00695C', hint:'10桁',     id:'kurumeunsou' },
};

function getUrl(key, no) {
  if (key === 'seino_sx') {
    return `https://inquire.trc.ssx.seino.co.jp/inq/inq_in.jsp?inq_no=${no}`;
  }
  return `https://trackings.jp/toi/${C[key].id}/${no}`;
}

function onChange() {
  const key = document.getElementById('carrier').value;
  const c = C[key];
  document.getElementById('dot').style.background = c.color;
  document.getElementById('bname').textContent = c.name;
  document.getElementById('bhint').textContent = '追跡番号目安：' + c.hint;
  document.getElementById('btn').style.background = c.color;
  document.getElementById('result').classList.remove('show');
  document.getElementById('no').value = '';
  document.getElementById('no').focus();
}

function doTrack() {
  const key = document.getElementById('carrier').value;
  const c = C[key];
  const no = document.getElementById('no').value.trim().replace(/\s/g, '');
  if (!no) { alert('追跡番号を入力してください'); return; }
  document.getElementById('rlabel').textContent = c.name + ' の追跡番号';
  document.getElementById('rno').textContent = no;
  const link = document.getElementById('rlink');
  link.href = getUrl(key, no);
  link.style.background = c.color;
  document.getElementById('result').classList.add('show');
}

document.getElementById('no').addEventListener('keydown', e => {
  if (e.key === 'Enter') doTrack();
});

onChange();
</script>
</body>
</html>
